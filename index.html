<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>電卓</title>
        <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1" crossorigin="anonymous">
        <style>
            .calculator_box{
                width: 350px;
            }
            input {
                width:  200px;
                height: 40px;
            }
            button {
                width: 50px;
                height: 40px;
            }
            .btn_result {
                width: 105px;
            }
        </style>
    </head>
    <body>
        <div id="calculator" class=" calculator_box text-center container border border-dark  rounded mt-4 py-4 ">
            
            <div class="border border-dark rounded mb-4 mx-4 pt-4">
                <input type="text" id="answer" class="rounded mb-4 ">
            </div>
            <div class="border border-dark rounded mx-4 pb-4">
                <br>
                <button class="btn btn-outline-dark">AC</button>
                <button class="btn btn-outline-dark">+-</button>
                <button class="btn btn-outline-dark">%</button>
                <button class="btn btn-outline-dark">÷</button>
                <br>
                <button class="btn btn-outline-dark">1</button>
                <button class="btn btn-outline-dark">2</button>
                <button class="btn btn-outline-dark">3</button>
                <button class="btn btn-outline-dark">×</button>
                <br>
                <button class="btn btn-outline-dark">4</button>
                <button class="btn btn-outline-dark">5</button>
                <button class="btn btn-outline-dark">6</button>
                <button class="btn btn-outline-dark">-</button>
                <br>
                <button class="btn btn-outline-dark">7</button>
                <button class="btn btn-outline-dark">8</button>
                <button class="btn btn-outline-dark">9</button>
                <button class="btn btn-outline-dark">+</button>
                <br>
                <button class="btn btn-outline-dark">0</button>
                <button class="btn btn-outline-dark">.</button>
                <button class="btn_result btn btn-outline-dark">=</button>    
                <br> 
            </div>
        </div>
    <script>
        $('#calculator button').on('click', function(){
        let num = $(this).text(); //押されたボタンを読み込む
        let formula = $('#answer').val(); //表示されている数値を読み込む
        console.log(num);

        if ( num === '=' ){ //=を押されて計算する時

            formula = formula.replace( "×" , "*" ); //×を*に置換
            formula = formula.replace( "÷" , "/" ); //÷を/に置換

            const result = Function('return ('+formula+');')(); //文字列の計算式の結果を求める

            $('#answer').val(result);
            return;
        }
        
        if( num === '+-' ){ //+-が押された時
            num = "" //+-を押された時に+-を隠す
            formula = -(formula);
            return;
        }

        if( num === '%'){ //%が押された時
            formula = (formula)/100;
            return;
        }

        //ACボタンが押された時
        if ( num === 'AC' ){
            $('#answer').val("");
            return;                                
        }
        // inputに追加
        $('#answer').val(formula + num);

    });

    </script>
    </body>
</html>
